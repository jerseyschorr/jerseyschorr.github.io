<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kitzur Shulchan Aruch Yomi Checklist</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f5f0e6;
      --card-bg: #ffffff;
      --text-main: #22252b;
      --text-muted: #666a73;
      --accent: #b08a3c;
      --accent-soft: #e2cfa0;
      --border: #d4c7b3;
      --checked: #2f855a;
      --danger: #b83232;
      --shadow-soft: 0 2px 6px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text-main);
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px 12px 24px;
    }

    header {
      padding: 12px 14px 10px;
      background: linear-gradient(to bottom, #fdf8ec, #f5f0e6);
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
    }

    header h1 span.he {
      display: block;
      font-family: "Times New Roman", "David", serif;
      font-size: 1.05rem;
    }

    header h1 span.en {
      display: block;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .header-divider {
      margin: 8px auto 10px;
      width: 80%;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      border-radius: 999px;
    }

    .streak-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .streak-main {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .streak-label {
      font-weight: 600;
    }

    .streak-label span.he {
      font-family: "Times New Roman", "David", serif;
      margin-right: 4px;
    }

    .streak-value {
      font-size: 1.1rem;
      color: var(--accent);
      font-weight: 700;
    }

    .streak-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    button {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      padding: 6px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text-main);
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    button span.he {
      font-family: "Times New Roman", "David", serif;
    }

    button.danger {
      border-color: var(--danger);
      color: var(--danger);
    }

    main {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 10px 12px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
    }

    .card-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
    }

    .card-title span.he {
      font-family: "Times New Roman", "David", serif;
    }

    .card-title span.en {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .today-siman {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .today-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .today-meta strong {
      font-weight: 600;
    }

    .today-meta span.he {
      font-family: "Times New Roman", "David", serif;
      margin-right: 4px;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      text-align: center;
      margin-top: 6px;
    }

    .stats-item {
      flex: 1;
    }

    .stats-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stats-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .list-container {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      border-radius: 12px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
      background: #f9f4ea;
    }

    .list-header {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      background: #f3ebdd;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .list-header span.he {
      font-family: "Times New Roman", "David", serif;
      margin-right: 4px;
    }

    .list-header select {
      font-size: 0.8rem;
      padding: 4px 6px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card-bg);
    }

    .day-item {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #e3d7c4;
      background: rgba(255,255,255,0.7);
    }

    .day-item:last-child {
      border-bottom: none;
    }

    .day-item.today {
      background: #fffaf0;
      box-shadow: inset 2px 0 0 var(--accent);
    }

    .day-checkbox {
      margin-right: 10px;
      flex-shrink: 0;
    }

    .day-checkbox input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--checked);
    }

    .day-content {
      flex: 1;
      min-width: 0;
    }

    .day-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 6px;
      font-size: 0.9rem;
    }

    .day-label {
      font-weight: 500;
    }

    .day-label span.he {
      font-family: "Times New Roman", "David", serif;
      margin-right: 4px;
    }

    .day-siman {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: right;
    }

    .day-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .day-meta span.he {
      font-family: "Times New Roman", "David", serif;
      margin-right: 4px;
    }

    .day-item.completed .day-label,
    .day-item.completed .day-siman {
      text-decoration: line-through;
      color: #7a7f88;
    }

    .day-item.completed .day-meta {
      color: #9a9fa8;
    }

    .footer-note {
      margin-top: 8px;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>
        <span class="he">קיצור שולחן ערוך יומי</span>
        <span class="en">Kitzur Shulchan Aruch Yomi</span>
      </h1>
      <div class="header-divider"></div>
      <div class="streak-row">
        <div class="streak-main">
          <div class="streak-label">
            <span class="he">רצף לימוד</span> / Streak
          </div>
          <div class="streak-value" id="streakValue">0</div>
          <div class="streak-sub" id="streakSub">No days completed yet</div>
        </div>
        <div class="header-actions">
          <button id="jumpTodayBtn">
            <span class="he">היום</span> Today
          </button>
          <button id="resetBtn" class="danger">
            <span class="he">איפוס</span> Reset
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="card" id="todayCard">
        <div class="card-title">
          <div>
            <span class="he">היום בלימוד</span> / <span class="en">Today’s Learning</span>
          </div>
          <div id="todayDayLabel" class="en"></div>
        </div>
        <div class="today-siman" id="todaySiman">Loading…</div>
        <div class="today-meta" id="todayMeta"></div>
      </section>

      <section class="card" id="statsCard">
        <div class="card-title">
          <span class="he">סטטיסטיקה</span> / <span class="en">Stats</span>
        </div>
        <div class="stats-row">
          <div class="stats-item">
            <div class="stats-value" id="statsCompleted">0</div>
            <div class="stats-label">
              <span class="he">הושלמו</span> / Completed
            </div>
          </div>
          <div class="stats-item">
            <div class="stats-value" id="statsPercent">0%</div>
            <div class="stats-label">
              <span class="he">אחוז</span> / Percent
            </div>
          </div>
          <div class="stats-item">
            <div class="stats-value" id="statsRemaining">0</div>
            <div class="stats-label">
              <span class="he">נותרו</span> / Remaining
            </div>
          </div>
        </div>
      </section>

      <section class="list-container">
        <div class="list-header">
          <div>
            <span class="he">רשימת ימים</span> / Days
          </div>
          <div>
            <label for="jumpSelect" style="margin-right:4px;">
              <span class="he">קפיצה</span> / Jump
            </label>
